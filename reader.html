<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えいごえほん 📖</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Hiragino Maru Gothic Pro', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
    min-height: 100vh;
    padding: 20px;
  }
  .header { text-align: center; margin-bottom: 20px; }
  h1 { font-size: 2rem; color: #fff; text-shadow: 2px 2px 0 #9c36b5; }
  .back { display: inline-block; margin-bottom: 10px; color: #9c36b5; text-decoration: none; font-size: 1rem; font-weight: bold; }

  /* STORY LIST */
  #story-list {
    max-width: 500px;
    margin: 0 auto;
  }
  .story-card {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    border: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .story-card:hover { border-color: #DA77F2; transform: translateY(-3px); }
  .story-icon { font-size: 3rem; flex-shrink: 0; }
  .story-info .story-title { font-size: 1.2rem; font-weight: bold; color: #9c36b5; margin-bottom: 4px; }
  .story-info .story-level { font-size: 0.85rem; color: #aaa; }
  .story-info .story-desc { font-size: 0.95rem; color: #555; }
  .story-stamp {
    font-size: 1.6rem;
    margin-left: auto;
    flex-shrink: 0;
  }

  /* READER */
  #reader { display: none; max-width: 560px; margin: 0 auto; }
  .reader-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .back-list-btn {
    padding: 8px 16px;
    background: #DA77F2;
    color: #fff;
    border: none;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .story-title-bar { font-size: 1.1rem; font-weight: bold; color: #fff; }
  .page-num { margin-left: auto; font-size: 0.9rem; color: rgba(255,255,255,0.8); }

  .book {
    background: #fff;
    border-radius: 24px;
    padding: 30px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    margin-bottom: 20px;
    min-height: 280px;
    position: relative;
  }
  .page-scene { font-size: 5rem; text-align: center; margin-bottom: 16px; }
  .page-text {
    font-size: 1.3rem;
    line-height: 2;
    color: #2c3e50;
    text-align: center;
    margin-bottom: 10px;
  }
  .page-text .word {
    display: inline-block;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: border-color 0.15s;
    padding: 0 2px;
  }
  .page-text .word:hover { border-color: #DA77F2; color: #9c36b5; }
  .page-jp {
    font-size: 0.95rem;
    color: #888;
    text-align: center;
    min-height: 28px;
    padding: 0 10px;
  }

  .word-popup {
    position: absolute;
    background: #9c36b5;
    color: #fff;
    padding: 8px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
    white-space: nowrap;
  }
  .word-popup.show { opacity: 1; }

  .reader-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .nav-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    transition: transform 0.15s;
  }
  .nav-btn:hover:not(:disabled) { transform: scale(1.05); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .btn-prev { background: #e0e0e0; color: #555; }
  .btn-speak { background: #DA77F2; color: #fff; }
  .btn-next { background: #9c36b5; color: #fff; }

  .stamp-display {
    text-align: center;
    font-size: 1.1rem;
    color: #fff;
    margin-top: 16px;
  }

  .finish-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .finish-overlay.show { display: flex; }
  .finish-box {
    background: #fff;
    border-radius: 24px;
    padding: 40px 30px;
    text-align: center;
    max-width: 340px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .finish-box .big-emoji { font-size: 4rem; }
  .finish-box h2 { font-size: 1.6rem; color: #9c36b5; margin: 12px 0; }
  .finish-box p { color: #555; margin-bottom: 20px; }
  .finish-box .ok-btn {
    padding: 12px 28px;
    background: #DA77F2;
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back">← もどる</a>
  <h1>📖 えいごえほん</h1>
</div>

<!-- STORY LIST -->
<div id="story-list">
  <div class="story-card" data-story="0">
    <div class="story-icon">🐣</div>
    <div class="story-info">
      <div class="story-title">The Little Chick</div>
      <div class="story-level">⭐ やさしい・4ページ</div>
      <div class="story-desc">ひよこのはじめての一日</div>
    </div>
    <div class="story-stamp" id="stamp-0">　</div>
  </div>
  <div class="story-card" data-story="1">
    <div class="story-icon">🌟</div>
    <div class="story-info">
      <div class="story-title">Star's Wish</div>
      <div class="story-level">⭐⭐ ふつう・5ページ</div>
      <div class="story-desc">おほしさまのねがいごと</div>
    </div>
    <div class="story-stamp" id="stamp-1">　</div>
  </div>
  <div class="story-card" data-story="2">
    <div class="story-icon">🦁</div>
    <div class="story-info">
      <div class="story-title">Leo's Big Day</div>
      <div class="story-level">⭐⭐⭐ すこしむずかしい・6ページ</div>
      <div class="story-desc">ライオンのレオのぼうけん</div>
    </div>
    <div class="story-stamp" id="stamp-2">　</div>
  </div>
</div>

<!-- READER -->
<div id="reader">
  <div class="reader-header">
    <button class="back-list-btn" id="back-list-btn">← えほんのリスト</button>
    <span class="story-title-bar" id="story-title-bar"></span>
    <span class="page-num" id="page-num"></span>
  </div>
  <div class="book" id="book">
    <div class="page-scene" id="page-scene"></div>
    <div class="page-text" id="page-text"></div>
    <div class="page-jp" id="page-jp"></div>
    <div class="word-popup" id="word-popup"></div>
  </div>
  <div class="reader-controls">
    <button class="nav-btn btn-prev" id="btn-prev">◀ まえ</button>
    <button class="nav-btn btn-speak" id="btn-speak">🔊 よむ</button>
    <button class="nav-btn btn-next" id="btn-next">つぎ ▶</button>
  </div>
  <div class="stamp-display" id="stamp-display"></div>
</div>

<div class="finish-overlay" id="finish-overlay">
  <div class="finish-box">
    <div class="big-emoji">🌟</div>
    <h2>よく よめたね！</h2>
    <p id="finish-story-name"></p>
    <div style="font-size:2.5rem;margin:12px 0">🏅</div>
    <button class="ok-btn" id="finish-ok-btn">もどる</button>
  </div>
</div>

<script>
const STORIES = [
  {
    title: 'The Little Chick',
    pages: [
      { scene:'🥚', en:'This is an egg.', jp:'これは たまごです。', words:{'egg':'たまご'} },
      { scene:'🐣', en:'The egg cracks open!', jp:'たまごが われました！', words:{'egg':'たまご','cracks':'われる','open':'あく'} },
      { scene:'🐥', en:'A little yellow chick comes out.', jp:'ちいさな きいろい ひよこが でてきました。', words:{'little':'ちいさい','yellow':'きいろい','chick':'ひよこ','comes':'くる','out':'そと'} },
      { scene:'🌸', en:'The chick says, "Hello, world!"', jp:'ひよこは「こんにちは せかい！」といいました。', words:{'chick':'ひよこ','says':'いう','Hello':'こんにちは','world':'せかい'} },
    ]
  },
  {
    title: "Star's Wish",
    pages: [
      { scene:'🌙', en:'It is night. The sky is dark.', jp:'よるです。そらは くらいです。', words:{'night':'よる','sky':'そら','dark':'くらい'} },
      { scene:'⭐', en:'One small star shines brightly.', jp:'ちいさな ほしが かがやいています。', words:{'small':'ちいさい','star':'ほし','shines':'かがやく','brightly':'あかるく'} },
      { scene:'🌠', en:'The star has a wish.', jp:'ほしには ねがいが あります。', words:{'star':'ほし','wish':'ねがい'} },
      { scene:'🌈', en:'"I want to be a rainbow!" it says.', jp:'「わたしは にじに なりたい！」とほしはいいました。', words:{'rainbow':'にじ','says':'いう'} },
      { scene:'🌈✨', en:'The star becomes a rainbow at last!', jp:'ついに ほしは にじに なりました！', words:{'star':'ほし','becomes':'なる','rainbow':'にじ','last':'さいご'} },
    ]
  },
  {
    title: "Leo's Big Day",
    pages: [
      { scene:'🦁', en:'Leo is a big lion.', jp:'レオは おおきな ライオンです。', words:{'big':'おおきい','lion':'ライオン'} },
      { scene:'🌅', en:'He wakes up early in the morning.', jp:'かれは あさ はやく おきます。', words:{'wakes':'おきる','early':'はやい','morning':'あさ'} },
      { scene:'🌿', en:'Leo walks into the green forest.', jp:'レオは みどりの もりに はいりました。', words:{'walks':'あるく','green':'みどり','forest':'もり'} },
      { scene:'🐦', en:'He sees a small bird singing.', jp:'かれは ちいさな とりが うたっているのを みました。', words:{'sees':'みる','small':'ちいさい','bird':'とり','singing':'うたう'} },
      { scene:'🤝', en:'Leo says, "Hello, friend!"', jp:'レオは「こんにちは、ともだち！」といいました。', words:{'friend':'ともだち'} },
      { scene:'🦁🐦', en:'They play together all day. What a big day!', jp:'かれらは いちにちじゅう いっしょに あそびました。なんて すてきな いちにちでしょう！', words:{'play':'あそぶ','together':'いっしょ','day':'いちにち'} },
    ]
  }
];

const stamps = JSON.parse(localStorage.getItem('reader_stamps') || '{}');
let currentStory = 0;
let currentPage = 0;

function renderStampList() {
  STORIES.forEach((s, i) => {
    document.getElementById(`stamp-${i}`).textContent = stamps[i] ? '🏅' : '';
  });
}

function openStory(idx) {
  currentStory = idx;
  currentPage = 0;
  document.getElementById('story-list').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('story-title-bar').textContent = STORIES[idx].title;
  renderPage();
}

function renderPage() {
  const story = STORIES[currentStory];
  const page = story.pages[currentPage];
  document.getElementById('page-num').textContent = `${currentPage+1} / ${story.pages.length}`;
  document.getElementById('page-scene').textContent = page.scene;
  document.getElementById('page-jp').textContent = page.jp;

  const textEl = document.getElementById('page-text');
  textEl.innerHTML = '';
  page.en.split(' ').forEach(token => {
    const clean = token.replace(/[^a-zA-Z']/g, '');
    const meaning = page.words && page.words[clean];
    if (meaning) {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = token + ' ';
      span.addEventListener('click', (e) => showPopup(span, meaning, e));
      textEl.appendChild(span);
    } else {
      textEl.appendChild(document.createTextNode(token + ' '));
    }
  });

  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').textContent = currentPage === story.pages.length - 1 ? 'おわり ✅' : 'つぎ ▶';

  const total = story.pages.length;
  const stars = '⭐'.repeat(Math.round((currentPage+1)/total*5));
  document.getElementById('stamp-display').textContent = stars;
}

let popupTimer = null;
function showPopup(el, meaning, e) {
  const popup = document.getElementById('word-popup');
  popup.textContent = meaning;
  const rect = el.getBoundingClientRect();
  const bookRect = document.getElementById('book').getBoundingClientRect();
  popup.style.left = (rect.left - bookRect.left) + 'px';
  popup.style.top = (rect.top - bookRect.top - 40) + 'px';
  popup.classList.add('show');
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => popup.classList.remove('show'), 2000);
  speak(el.textContent.trim().replace(/[^a-zA-Z']/g, ''));
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

document.getElementById('btn-speak').addEventListener('click', () => {
  const page = STORIES[currentStory].pages[currentPage];
  speak(page.en);
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentPage > 0) { currentPage--; renderPage(); }
});

document.getElementById('btn-next').addEventListener('click', () => {
  const story = STORIES[currentStory];
  if (currentPage < story.pages.length - 1) {
    currentPage++;
    renderPage();
  } else {
    stamps[currentStory] = true;
    localStorage.setItem('reader_stamps', JSON.stringify(stamps));
    document.getElementById('finish-story-name').textContent = `「${story.title}」をよみおわったよ！`;
    document.getElementById('finish-overlay').classList.add('show');
  }
});

document.getElementById('back-list-btn').addEventListener('click', () => {
  document.getElementById('reader').style.display = 'none';
  document.getElementById('story-list').style.display = 'block';
  renderStampList();
});

document.getElementById('finish-ok-btn').addEventListener('click', () => {
  document.getElementById('finish-overlay').classList.remove('show');
  document.getElementById('reader').style.display = 'none';
  document.getElementById('story-list').style.display = 'block';
  renderStampList();
});

document.querySelectorAll('.story-card').forEach(card => {
  card.addEventListener('click', () => openStory(Number(card.dataset.story)));
});

renderStampList();
</script>
</body>
</html>
